<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lanby — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f11;
      color: #e8e8ed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 2rem;
    }

    .wordmark {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #888;
      max-width: 380px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border: 1px solid #2a2a2e;
      border-radius: 999px;
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="wordmark">Lanby</div>
  <p class="tagline">Uptime monitoring that stays out of your way. Coming soon.</p>
  <span class="badge">Coming Soon</span>
</body>
</html>
